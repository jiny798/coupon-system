# Phase 0 기본 설정
# 주의: 이 앱은 MySQL이 떠 있어야 부팅됩니다.
#       Phase 0 - 3번 (docker-compose로 MySQL 실행)을 먼저 하세요.
#       docker-compose에서 MYSQL_DATABASE=coupon 환경변수로 DB를 만들어주면 편합니다.

spring:
  application:
    name: coupon-system

  datasource:
    url: jdbc:mysql://localhost:3306/coupon?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 학습 초반에는 create로 시작하고, Phase 1 후반에 validate + 직접 DDL 관리로 바꿔보세요.
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

# 로컬 개발용 시크릿. 실제 배포 시에는 환경변수로 주입해야 한다 (JWT_SECRET)
jwt:
  secret: ${JWT_SECRET:coupon-system-local-dev-secret-key-do-not-use-in-prod}
  access-token-validity-ms: 3600000
