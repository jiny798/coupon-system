# 쿠폰 시스템 로컬 인프라
# 실행:   docker compose up -d
# 중지:   docker compose stop        (컨테이너만 멈춤, 데이터 유지)
# 삭제:   docker compose down       (컨테이너 삭제, 볼륨의 데이터는 유지)
# 초기화: docker compose down -v    (볼륨까지 삭제 = DB 데이터 전부 리셋)

services:

  mysql:
    # Docker Hub의 공식 MySQL 이미지. 태그(8.0.34)로 버전을 고정해야
    # 나중에 다시 실행해도 항상 같은 버전이 뜬다. (latest 금지)
    image: mysql:8.0.34

    # 컨테이너 이름. 지정 안 하면 coupon-system-mysql-1 같은 자동 이름이 붙는다.
    container_name: coupon-mysql

    # "호스트포트:컨테이너포트" 매핑.
    # 컨테이너 안의 3306을 내 PC의 3306으로 연결해준다.
    # 덕분에 스프링부트(application.yml)가 localhost:3306으로 접속 가능.
    ports:
      - "3306:3306"

    # 컨테이너 첫 실행 시 MySQL 초기 설정에 쓰이는 환경변수.
    # MYSQL_DATABASE: 이 이름의 데이터베이스를 자동 생성해준다.
    # -> application.yml의 url(jdbc:mysql://localhost:3306/coupon)과 맞춰둠.
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: coupon
      TZ: Asia/Seoul

    # 명명된 볼륨(named volume)에 데이터 파일을 저장.
    # 컨테이너는 원래 삭제되면 내부 데이터도 사라지는데,
    # 볼륨에 저장하면 docker compose down 후 다시 up 해도 데이터가 남는다.
    volumes:
      - mysql-data:/var/lib/mysql

    # 컨테이너가 "떠 있는 것"과 MySQL이 "접속 가능한 것"은 다르다.
    # (MySQL은 뜨고 나서 초기화에 몇 초~수십 초 걸림)
    # healthcheck를 정의해두면 docker compose ps 에서 준비 상태(healthy)를 볼 수 있고,
    # 나중에 다른 컨테이너가 depends_on: condition: service_healthy 로 기다릴 수 있다.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.2
    container_name: coupon-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

# 위에서 참조한 명명된 볼륨의 선언부.
# 실체는 Docker가 관리하는 저장 공간이고, docker volume ls 로 확인 가능.
volumes:
  mysql-data:
